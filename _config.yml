# Jekyll configuration for SpecGantry documentation site
# Hosted at https://specgantry.github.io

title: SpecGantry
description: AI-assisted SDLC pipeline for Claude Code
url: https://specgantry.github.io
baseurl: ""

# Theme — fully custom layouts (no remote theme)
plugins:
  - jekyll-seo-tag

# Markdown processor
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Page defaults by path
defaults:
  - scope:
      path: "docs"
    values:
      layout: docs
  - scope:
      path: "blog"
    values:
      layout: docs

# Exclude files from build
exclude:
  - .git
  - .github
  - LICENSE
  - NOTICE
  - SECURITY.md
  - CONTRIBUTING.md
  - .claude
  - .claude-plugin
  - agents
  - config
  - skills
  - release.sh

# Keep files from being processed but not excluded
keep_files:

# Layout
layout: landing

# Author
author: Mangesh Pise
github: https://github.com/mppise

# Logo
logo: /assets/icon.png

