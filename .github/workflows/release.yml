name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create plugin package
        run: |
          zip -r spec-gantry.zip . \
            -x '.git/*' \
            '.gitignore' \
            'node_modules/*' \
            '.DS_Store' \
            '*.log' \
            '.env*' \
            '.github/*' \
            '.pluginignore' \
            'PLUGIN-STRUCTURE.md' \
            'scripts/*' \
            'docs/*' \
            'README.md' \
            '.claude/*'

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: spec-gantry.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update plugin registry (optional)
        run: |
          echo "Release created for SpecGantry v${{ steps.version.outputs.VERSION }}"
