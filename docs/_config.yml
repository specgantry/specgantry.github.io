# Jekyll configuration for SpecGantry documentation site
# Hosted at https://specgantry.github.io

title: SpecGantry
description: AI-assisted SDLC pipeline for Claude Code
url: https://specgantry.github.io
baseurl: ""

# Theme — minima activates Jekyll layout loading on GitHub Pages;
# our _layouts/ files (landing.html, docs.html) override it completely.
theme: minima
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Markdown processor
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Page defaults by path
defaults:
  - scope:
      path: ""
    values:
      layout: landing
  - scope:
      path: "docs"
    values:
      layout: docs
  - scope:
      path: "blog"
    values:
      layout: docs

# Exclude files from build
exclude: []

# Author
author: Mangesh Pise
github: https://github.com/mppise

# Logo
logo: /assets/icon.png
